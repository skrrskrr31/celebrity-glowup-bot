name: Celebrity Glow-Up Bot
on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run bot
        env:
          TOKEN_JSON:   ${{ secrets.TOKEN_JSON }}
          SECRET_JSON:  ${{ secrets.SECRET_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python 1_eski_yeni_video_bot.py
      - name: Save used celebs
        run: |
          git config user.name "Glow-Up Bot"
          git config user.email "bot@github.com"
          git add used_celebs.json || true
          git diff --staged --quiet || git commit -m "chore: update used celebs [skip ci]"
          git push || true
